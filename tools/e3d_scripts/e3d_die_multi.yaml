options:
  periodicity: 36
  die-simulation: true
  ResolutionLevel: 3
 
stages:
  init:
    steps:
      - solver: MomentumEquation
        param_file: _data_BU/q2p1_paramV_DIE_0.dat
      - solver: MaterialDistribution
        param_file: _data_BU/q2p1_paramAlpha.dat

  main:
    loop: 1
    steps:
      - solver: MomentumEquation
        param_file: _data_BU/q2p1_paramV_DIE_1.dat
      - solver: MaterialDistribution
        param_file: _data_BU/q2p1_paramAlpha.dat

  final:
    steps:
      - solver: MomentumEquation
        param_file: _data_BU/q2p1_paramV_DIE_1.dat
